spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vegetable_shop_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

# SpringDoc OpenAPI configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
